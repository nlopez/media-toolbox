name: ci

on:
  push:

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      -
        name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5
      -
        name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      -
        name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          push: true
          platforms: linux/amd64
          tags: |
            nlopez/media-toolbox:${{ github.sha }}
            ghcr.io/nlopez/media-toolbox:${{ github.sha }}
          build-args: |
            UID=1001
            GID=1001
            YT_DLP_VERSION=2026.5.25.234532.dev0
            BGUTIL_YTDLP_POT_PROVIDER_VERSION=1.3.1
          cache-from: |
            type=gha
            type=registry,ref=nlopez/media-toolbox:build-cache
          cache-to: |
            type=gha,mode=max
            type=registry,ref=nlopez/media-toolbox:build-cache,mode=max
