name: ci

on:
  push:
  schedule:
    - cron: '0 6 * * *'  # daily at 06:00 UTC
  workflow_dispatch:
    inputs:
      yt_dlp_version:
        description: 'yt-dlp version to build with (e.g. 2026.5.25.234532.dev0)'
        required: false
        default: ''

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      -
        name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5
      -
        name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      -
        name: Check for new yt-dlp nightly release
        id: check_version
        if: github.event_name == 'schedule'
        run: |
          PYPI_VERSION=$(curl -s --connect-timeout 30 --max-time 60 https://pypi.org/pypi/yt-dlp/json | \
            python3 -c "
import sys, json
data = json.load(sys.stdin)
versions = data['releases']
dev_versions = sorted(
    [v for v in versions.keys() if '.dev0' in v],
    reverse=True
)
print(dev_versions[0] if dev_versions else '')
")
          PINNED=$(grep '^YT_DLP_VERSION' Makefile | cut -d= -f2 | tr -d ' ')
          echo "latest=$PYPI_VERSION" >> $GITHUB_OUTPUT
          echo "pinned=$PINNED" >> $GITHUB_OUTPUT
          if [ -n "$PYPI_VERSION" ] && [ "$PYPI_VERSION" != "$PINNED" ]; then
            echo "update=true" >> $GITHUB_OUTPUT
          else
            echo "update=false" >> $GITHUB_OUTPUT
          fi
          echo "Latest nightly: $PYPI_VERSION | Pinned: $PINNED"
      -
        name: Build and push (cron, version bump found)
        if: steps.check_version.outputs.update == 'true'
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          push: true
          platforms: linux/amd64
          tags: |
            nlopez/media-toolbox:${{ steps.check_version.outputs.latest }}
            nlopez/media-toolbox:${{ steps.check_version.outputs.latest }}-${{ github.sha }}
            nlopez/media-toolbox:${{ github.sha }}
            ghcr.io/nlopez/media-toolbox:${{ steps.check_version.outputs.latest }}
            ghcr.io/nlopez/media-toolbox:${{ steps.check_version.outputs.latest }}-${{ github.sha }}
            ghcr.io/nlopez/media-toolbox:${{ github.sha }}
          labels: |
            org.opencontainers.image.description=Media Toolbox: A Docker-based development environment with audio/video/CLI tools for media processing.
          build-args: |
            UID=1001
            GID=1001
            YT_DLP_VERSION=${{ steps.check_version.outputs.latest }}
            BGUTIL_YTDLP_POT_PROVIDER_VERSION=1.3.1
          cache-from: |
            type=gha
            type=registry,ref=nlopez/media-toolbox:build-cache
          cache-to: |
            type=gha,mode=max
            type=registry,ref=nlopez/media-toolbox:build-cache,mode=max
      -
        name: Bump yt-dlp version
        if: steps.check_version.outputs.update == 'true'
        run: |
          NEW_VERSION="${{ steps.check_version.outputs.latest }}"
          sed -i "s/^YT_DLP_VERSION :=.*/YT_DLP_VERSION := $NEW_VERSION/" Makefile
          git config user.name "ci-bot"
          git config user.email "ci@nlopez.github.io"
          git add Makefile
          git commit -m "chore: bump yt-dlp to $NEW_VERSION"
          git push
      -
        name: Read yt-dlp version
        id: read_version
        run: |
          VERSION=$(grep '^YT_DLP_VERSION' Makefile | cut -d= -f2 | tr -d ' ')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      -
        name: Build and push (push event or cron, no bump)
        if: github.event_name != 'schedule' || steps.check_version.outputs.update != 'true'
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          push: true
          platforms: linux/amd64
          tags: |
            nlopez/media-toolbox:${{ github.sha }}
            ghcr.io/nlopez/media-toolbox:${{ github.sha }}
          labels: |
            org.opencontainers.image.description=Media Toolbox: A Docker-based development environment with audio/video/CLI tools for media processing.
          build-args: |
            UID=1001
            GID=1001
            YT_DLP_VERSION=${{ github.event.inputs.yt_dlp_version || steps.read_version.outputs.version || '2026.5.25.234532.dev0' }}
            BGUTIL_YTDLP_POT_PROVIDER_VERSION=1.3.1
          cache-from: |
            type=gha
            type=registry,ref=nlopez/media-toolbox:build-cache
          cache-to: |
            type=gha,mode=max
            type=registry,ref=nlopez/media-toolbox:build-cache,mode=max
