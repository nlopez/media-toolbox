name: ci

on:
  push:

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@v4
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      -
        name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      -
        name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          platforms: linux/amd64
          tags: |
            nlopez/media-toolbox:${{ github.sha }}
            ghcr.io/nlopez/media-toolbox:${{ github.sha }}
          build-args: |
            UID=1001
            GID=1001
          cache-from: |
            type=gha
            type=registry,ref=nlopez/media-toolbox:build-cache
          cache-to: |
            type=gha,mode=max
            type=registry,ref=nlopez/media-toolbox:build-cache,mode=max
